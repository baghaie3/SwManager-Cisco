
{% block flash_messages %}{% endblock %}

<style>
    /* فقط کلاس‌های لاگین، نه body */

    .login-wrapper {
        min-height: 100%; /* بسته به ارتفاع هدر، اگر لازم شد تنظیم کن */
        display: inline-flex;
    }

    .login-box {
        background: rgba(255, 255, 255, 0); /* شفافیت روی محتوا */
        backdrop-filter: blur(3px);            /* اگر مرورگرها اجازه دهند، افکت شیشه‌ای */
        -webkit-backdrop-filter: blur(8px);
        padding: 32px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        width: 100%;
        max-width: 360px; /* فقط عرض فرم، ربطی به سایدبار ندارد */
        text-align: center;
    }

    .login-box h2 {
        margin-bottom: 20px;
    }

    .login-box form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        text-align: left;
    }

    .login-box label {
        font-size: 0.9rem;
        margin-bottom: 4px;
    }

    .login-box input {
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 0.95rem;
    }

    .login-box button {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 6px;
        border: none;
        background-color: #198754; /* شبیه btn-success بوت‌استرپ */
        color: #fff;
        cursor: pointer;
        font-weight: 600;
    }

    .login-box button:hover {
        background-color: #157347;
    }
</style>

<div class="login-wrapper">
    <div class="login-box">
        <h2>Login</h2>
        <form method="POST">
            <div>
                <label style="margin-right: 9px;" for="username">User</label>
                <input id="username" type="text" name="username" required />
            </div>
            <div>
                <label for="password">Secret</label>
                <input id="password" type="password" name="password" required />
            </div>
            <button style="
    display: flex;
    justify-content: space-around;
    margin-right: 22%;
    margin-left: 38%;
" type="submit">Enter</button>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, msg in messages %}
<div class="alert alert-{{ category }}">
    {{ msg }}
</div>
{% endfor %}
{% endif %}
{% endwith %}
        </form>
    </div>
</div>

<script>
(async () => {
  try {
    const res = await fetch("/api/images", { cache: "no-store" });
    const files = await res.json();
    if (!files.length) return;

    const random = files[Math.floor(Math.random() * files.length)];
    document.body.style.backgroundImage = `url('/dataset/${random}')`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
  } catch (e) {
    console.error(e);
  }
})();
</script>
