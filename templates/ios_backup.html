{% extends "base.html" %}
{% block title %}IOS Info Backup{% endblock %}

{% block content %}
<h2>IOS Info Backup</h2>

<form id="ios-form" method="post" action="{{ url_for('vlan_backup.ios_backup_run') }}">
    <div>
        {% for sw in switches %}
            <div>
                <label>
                    <input type="checkbox" name="switch_ids" value="{{ sw.id }}">
                    {{ sw.name }} ({{ sw.ip }})
                </label>
            </div>
        {% endfor %}
    </div>
    <button type="submit">Run IOS Info Backup</button>
</form>

<pre id="ios-output"></pre>

<script>
  const form = document.getElementById("ios-form");
  const out = document.getElementById("ios-output");

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    out.textContent = "";

    const formData = new FormData(form);

    fetch("{{ url_for('vlan_backup.ios_backup_run') }}", {
      method: "POST",
      body: formData,
    }).then((res) => {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      function read() {
        reader.read().then(({ done, value }) => {
          if (done) return;
          const text = decoder.decode(value);
          out.textContent += text;
          read();
        });
      }
      read();
    });
  });
</script>
{% endblock %}
