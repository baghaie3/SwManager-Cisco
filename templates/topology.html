{% extends "base.html" %}

{% block title %}Network Topology{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 style="margin-bottom: 5px;" class="mb-4">SWTopology Mapping</h2>
    
    <div class="row">
        <!-- ستون لیست سوئیچ‌ها -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Select Switches</span>
                    <span class="badge bg-primary">Selection</span>
                </div>
                <div class="card-body">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="select_all" onclick="toggleSelectAll(this)">
                        <label class="form-check-label" for="select_all">Select All</label>
                    </div>
                    <!-- لیست سوئیچ‌ها در اینجا بارگزاری می‌شود -->
                    <div id="switch_list" style="max-height: 400px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>

        <!-- ستون تنظیمات اسکن و نمایش نقشه -->
        <div class="col-md-8">
            <div class="card mb-3">
                <div class="card-body d-flex gap-3 align-items-end">
                    <div class="flex-grow-1">
                        <label for="scan_protocol" class="form-label">Discovery Protocol</label>
                        <select id="scan_protocol" class="form-select">
                            <option value="both">CDP + LLDP</option>
                            <option value="cdp">CDP only</option>
                            <option value="lldp">LLDP only</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="scan()">Scan Topology</button>
<button onclick="exportSVG()">Export SVG</button>
                </div>
            </div>
            
            <div class="progress">
    <div id="progress_bar"
         class="progress-bar progress-bar-striped progress-bar-animated bg-success"
         role="progressbar"
         style="width:0%">
        0%
    </div>
</div>

            <!-- کانتینر رسم گراف (برای vis-network) -->
            <div id="topology_container" style="width: 100%; height: 600px; border: 1px solid lightgray;"></div>
            
        </div>
    </div>
</div>

<!-- اسکریپت‌های اختصاصی توپولوژی -->
<script src="{{ url_for('static', filename='vis-network.min.js') }}"></script>
<script src="{{ url_for('static', filename='topology.js') }}"></script>
{% endblock %}
